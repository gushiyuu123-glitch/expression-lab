<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="doorGlow" x1="14" y1="8" x2="52" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff6fb2"/>
      <stop offset="0.52" stop-color="#ff2f93"/>
      <stop offset="1" stop-color="#57ddec"/>
    </linearGradient>

    <linearGradient id="innerLight" x1="32" y1="13" x2="32" y2="52" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="0.48" stop-color="#ff6fb2" stop-opacity="0.72"/>
      <stop offset="1" stop-color="#57ddec" stop-opacity="0.58"/>
    </linearGradient>

    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="64" height="64" rx="14" fill="#030405"/>

  <circle cx="37" cy="33" r="22" fill="#ff2f93" opacity="0.08" filter="url(#softGlow)"/>
  <circle cx="28" cy="38" r="17" fill="#57ddec" opacity="0.08" filter="url(#softGlow)"/>

  <path
    d="M18 55L28 45H45L54 55H18Z"
    fill="url(#doorGlow)"
    opacity="0.18"
    filter="url(#softGlow)"
  />

  <path
    d="M19 53V11H45V53"
    stroke="url(#doorGlow)"
    stroke-width="3.2"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#glow)"
  />

  <path
    d="M45 11L53 17V58L45 53"
    stroke="#ff6fb2"
    stroke-width="2.2"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.82"
    filter="url(#glow)"
  />

  <path
    d="M25 49V18H40V49"
    stroke="url(#innerLight)"
    stroke-width="1.8"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.82"
  />

  <circle cx="32.5" cy="34" r="5.2" fill="url(#innerLight)" opacity="0.9" filter="url(#glow)"/>

  <path
    d="M15 55H49"
    stroke="#57ddec"
    stroke-width="1.4"
    stroke-linecap="round"
    opacity="0.58"
    filter="url(#glow)"
  />

  <circle cx="16" cy="18" r="1" fill="#ff6fb2" opacity="0.72"/>
  <circle cx="50" cy="26" r="1.1" fill="#57ddec" opacity="0.7"/>
  <circle cx="13" cy="42" r="0.8" fill="#ffffff" opacity="0.54"/>
</svg>
